<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Owners</title>
</head>
<link rel="stylesheet" th:href="@{/css/owner.css}">
<body>

<nav>
    <a th:href="@{/}">Home</a>
    <a th:href="@{/owners}">Owners</a>
    <a th:href="@{/dogs}">Dogs</a>
</nav>

<div class="container">

    <h1>Owners</h1>

    <a th:href="@{/owners/new}">
        <button>Add Owner</button>
    </a>

    <table border="1">

        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>

        <tr th:each="owner : ${owners}">
            <td th:text="${owner.firstName + ' ' + owner.lastName}"></td>
            <td th:text="${owner.email}"></td>
            <td th:text="${owner.phone}"></td>

            <td>
                <a th:href="@{/owners/edit/{id}(id=${owner.id})}">Edit</a>
                <a th:href="@{/owners/delete/{id}(id=${owner.id})}">Delete</a>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
