<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Owners</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header>
    <nav>
        <a th:href="@{/owners}">Owners</a>
        <a th:href="@{/dogs}">Dogs</a>
        <a th:href="@{/playgroups}">Playgroups</a>
    </nav>
</header>

<div class="container">
    <h1>Owners</h1>

    <a th:href="@{/owners/new}">
        <button class="btn-primary">Add Owner</button>
    </a>

    <table>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>

        <tr th:each="owner : ${owners}">
            <td th:text="${owner.firstName + ' ' + owner.lastName}"></td>
            <td th:text="${owner.email}"></td>
            <td th:text="${owner.phone}"></td>
            <td>
                <a th:href="@{'/owners/edit/' + ${owner.id}}">
                    <button class="btn-primary">Edit</button>
                </a>
                <a th:href="@{'/owners/delete/' + ${owner.id}}">
                    <button class="btn-danger">Delete</button>
                </a>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
