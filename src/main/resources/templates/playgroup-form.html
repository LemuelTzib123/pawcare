<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Playgroup</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

    <h1>Add Playgroup</h1>

    <form th:action="@{/playgroups/save}" th:object="${playgroup}" method="post">

        <label>Group Name</label>
        <input type="text" th:field="*{groupName}" required>

        <label>Activity Type</label>
        <input type="text" th:field="*{activityType}">

        <label>Size Limit</label>
        <input type="number" th:field="*{sizeLimit}">

        <button class="btn-primary" type="submit">Save</button>

    </form>

    <br>

    <a th:href="@{/playgroups}">Back</a>

</div>

</body>
</html>
