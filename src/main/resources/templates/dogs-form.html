<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dog Form</title>
    <link rel="stylesheet" th:href="@{/css/dog-form.css}">
</head>
<body>

<h1 th:text="${dog.id} != null ? 'Edit Dog' : 'Add Dog'"></h1>

<form th:action="@{/dogs/save}" th:object="${dog}" method="post">

    <!-- 🔥 FIX: Force ID to be sent -->
    <input type="hidden" name="id" th:value="${dog.id}" />

    <input type="text"
           th:field="*{name}"
           placeholder="Dog Name"
           required />
    <br><br>

    <input type="text"
           th:field="*{breed}"
           placeholder="Breed" />
    <br><br>

    <input type="number"
           th:field="*{age}"
           placeholder="Age" />
    <br><br>

    <!-- ✅ FIXED owner binding -->
    <select th:field="*{owner.id}">
        <option value="">-- Select Owner --</option>

        <option th:each="owner : ${owners}"
                th:value="${owner.id}"
                th:text="${owner.firstName + ' ' + owner.lastName}">
        </option>
    </select>

    <br><br>

    <button type="submit">Save</button>

</form>

<br>

<a th:href="@{/dogs}">Back</a>

</body>
</html>
