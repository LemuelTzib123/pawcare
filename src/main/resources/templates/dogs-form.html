<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dog Form</title>
</head>
<body>

<h1>Dog Form</h1>

<form th:action="@{/dogs/save}" th:object="${dog}" method="post">

    <input type="text" th:field="*{name}" placeholder="Dog Name" required>
    <br><br>

    <input type="text" th:field="*{breed}" placeholder="Breed">
    <br><br>

    <input type="number" th:field="*{age}" placeholder="Age" min="0">
    <br><br>

    <label>
        <input type="checkbox" th:field="*{vaccinated}">
        Vaccinated
    </label>

    <br><br>

    <select name="ownerId">
        <option value="">Select Owner</option>
        <option th:each="owner : ${owners}"
                th:value="${owner.id}"
                th:text="${owner.firstName + ' ' + owner.lastName}">
        </option>
    </select>

    <br><br>

    <button type="submit">Save</button>

</form>

<br>
<a th:href="@{/dogs}">Back</a>

</body>
</html>
