<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Owner Form</title>
</head>
<body>

<h1>Owner Form</h1>

<form th:action="@{/owners/save}"
      th:object="${owner}"
      method="post">

    <!-- REQUIRED FOR EDIT -->
    <input type="hidden" th:field="*{id}" />

    <div>
        <input type="text"
               th:field="*{firstName}"
               placeholder="First Name"
               required>
    </div>

    <br>

    <div>
        <input type="text"
               th:field="*{lastName}"
               placeholder="Last Name"
               required>
    </div>

    <br>

    <div>
        <input type="email"
               th:field="*{email}"
               placeholder="Email">
    </div>

    <br>

    <div>
        <input type="text"
               th:field="*{phone}"
               placeholder="Phone">
    </div>

    <br>

    <button type="submit">Save</button>

</form>

<br>

<a th:href="@{/owners}">Back to Owners</a>

</body>
</html>
